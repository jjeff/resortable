name: Release

on:
  push:
    branches:
      - main
      - develop
      - alpha

permissions:
  contents: read # for checkout

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pin >= 22.14.0 to satisfy semantic-release@25 / @semantic-release/npm@13 engines
          node-version: '22.14.0'
          cache: 'npm'

      # npm >= 11.5.1 is required for OIDC trusted publishing. Pin to 11.x so a
      # future npm major (which may require newer Node) can't break the job.
      - name: Upgrade npm
        run: npm install -g 'npm@^11.5.1'

      - name: Install dependencies
        run: npm ci

      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: npm audit signatures

      # E2E is gated on PRs by ci.yml; release only needs unit tests
      - name: Run unit tests
        run: npm run test:unit

      - name: Build library
        run: npm run build

      - name: Build with Rollup
        run: npm run build:rollup

      # No NPM_TOKEN: npm publish authenticates via OIDC trusted publishing.
      # Provenance is generated automatically. Requires id-token: write (above).
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release